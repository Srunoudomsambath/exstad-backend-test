spring.application.name=exstad-backend-api

# Database
spring.datasource.url=jdbc:postgresql://dpg-d729fs450q8c738llbrg-a.oregon-postgres.render.com:5432/exstad_backend
spring.datasource.username=exstad_backend_user
spring.datasource.password=ZeSBfnsuL4BCRg6ekntnOFYzNOKj4Zzb
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true

# Keycloak - using defaults so app starts even if KC is down
keycloak.server-url=${KC_SERVER_URL:http://localhost:8180}
keycloak.realm=${KC_REALM:master}
keycloak.client-id=${KC_CLIENT_ID:dummy-client}
keycloak.secret-id=${KC_SECRET_ID:dummy-secret}
keycloak.frontend-client-id=exstad-frontend
keycloak.frontend-secret-id=f0cS9T3mOKfmBQdrGbbeblygW88oEitc

# This uses jwk-set-uri instead of issuer-uri to avoid startup fetch
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KC_SERVER_URL:http://localhost:8180}/realms/${KC_REALM:master}/protocol/openid-connect/certs

# Multipart / uploads
spring.servlet.multipart.max-request-size=500MB
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=0

# Tomcat settings for large uploads
server.tomcat.max-swallow-size=-1
server.tomcat.max-http-form-post-size=-1
server.tomcat.connection-timeout=3600000

# MinIO
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
minio.bucket=exstad

# Server
server.public-access=${SERVER_PUBLIC_ACCESS:http://localhost:8080}

# Bakong
bakong.account-id=${BAKONG_ACCOUNT_ID:dummy}
bakong.acquiring-bank=${ACQUIRINGBANK:dummy}
bakong.merchant-name=${MERCHANTNAME:dummy}
bakong.mobile-number=${MOBILENUMBERSTORELABEL:dummy}
bakong.store-label=${STORELABEL:dummy}
bakong.base-url=${BAKONG_BASE_URL:https://api-bakong.nbc.gov.kh}
bakong.bearer-token=${BAKONG_BEARER_TOKEN:dummy}